name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test (Lua ${{ matrix.lua-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lua-version: ["5.1", "5.2", "5.3", "5.4"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: ${{ matrix.lua-version }}

      - name: Install LuaRocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Run tests
        run: |
          lua spec/run.lua

  test-luajit:
    name: Test (LuaJIT)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LuaJIT
        run: |
          sudo apt-get update
          sudo apt-get install -y luajit

      - name: Run tests
        run: |
          luajit spec/run.lua
